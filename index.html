<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <title>Monster Guesser</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<p id="dayLabel"></p>
  <h1>Monster Guesser</h1>
<button onclick="playPreviousDay()">Play Previous Day</button>
<button onclick="playNextDay()">Play Next Day</button>

  <input type="text" id="guessInput" list="monsterList" placeholder="Enter monster name">
<datalist id="monsterList"></datalist>
<button onclick="checkGuess()">Guess</button>
<p id="attemptCounter"></p>
  <p id="result"></p>

  <h2>Guess History</h2>
  <div id="history"></div>

  <script src="script.js"></script>
<a href="https://visitorbadge.io/status?path=https%3A%2F%2Fvellescian.github.io%2FMonster-guesser%2F"><img src="https://api.visitorbadge.io/api/visitors?path=https%3A%2F%2Fvellescian.github.io%2FMonster-guesser%2F&label=Visitors&labelColor=%23222222&countColor=%23263759" /></a>
</body>
</html>
